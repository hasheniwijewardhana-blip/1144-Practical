<!DOCTYPE html>
<html lang="en">
<head>
   <style>
       table {
          width: 100%;
          border-collapse: collapse;
       }

       th, td {
          border: 1px solid #ddd;
          padding: 8px;
          text-align: left;
       }

       th {
          background-color: #f2f2f2;
       }
</style>

<body>
    <table border="1">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Age</th>
    </tr>
    <tr>
      <td>1</td>
      <td>John</td>
      <td>25</td>
    </tr>
    <tr>
      <td>2</td>
      <td>Jane</td>
      <td>30</td>
    </tr>
    <tr>
      <td>3</td>
      <td>Mike</td>
      <td>28</td>
    </tr>
</body>
</table>
