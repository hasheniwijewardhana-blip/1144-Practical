<!DOCTYPE html>
<html lang="en">
<head>
   <title>Student Registration Form</title>
   <style>
    body{
	   font-family:sans-serif;
	   background-color:yellow;
	   adding:40px;
	   margin:0;
	}
	h{
	   color:#1a2020c;
	   font-size:1.6rem;
	   margin-bottom:24px;
	}
	button{
	   background-color:#5da3d9;
	}
   </style>
</head>
<body>
   <h1>Student Registration Form</h1>
   <form>
      <label>Full Name</label>
	  <input type="text"placeholder="Enter your Full Name"></input><br><br>
	  <label>Email</label>
	  <input type="email"placeholder="Enter your email"></input><br><br>
	  <label>Password</label>
	  <input type="password"placeholder="xxxxxxx"></input><br><br>
	  <label>Age</label>
	  <input type="number"placeholder="your age"></input><br><br>
	  <label>Phone Number</label>
	  <input type="tel"placeholder="+94000000000"></input><br><br>
	  <input type="radio" name="gender"></input>Male</label><br>
	  <input type="radio" name="gender"></input>female</label><br>
	  <p>Skills</p>
	  <label><input type="checkbox"name="skill">HTML</label></input><br>
	  <label><input type="checkbox"name="skill">CSS</label></input><br>
	  <label><input type="checkbox"name="skill">PHP</label></input><br>
	  <label>Year Of Student</label>
	  <select name="Year">
	    <option>1st year</option>
		<option>2nd year</option>
		<option>3rd year</option>
		<option>4th year</option>
	  </select>
	  <label>About You</label><br>
	  <textarea rows="4"placeholder="Tell about Your self"></textarea><br><br>
	  <button type="Submit">Submit</button>
   </form>
</body>
</html>
